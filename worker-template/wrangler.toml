name = "kanpe-g2-worker-wanpoko"
main = "index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
CLAUDE_MODEL = "claude-opus-4-7"
CLAUDE_MAX_TOKENS = "2000"
AISEARCH_INSTANCE = "soft-pond-d91c"
AISEARCH_MAX_RESULTS = "8"
DEEPGRAM_MODEL = "nova-3"

# Set via wrangler secret (NOT in this file):
#   wrangler secret put SHARED_SECRET
#   wrangler secret put DEEPGRAM_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put AISEARCH_TOKEN
#   wrangler secret put CF_ACCOUNT_ID
#
# SHARED_SECRET goes into the Cue plugin settings page as "Bearer token".
# Pick a long random string (32+ chars).
